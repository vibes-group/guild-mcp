# Ротация json-file логов, чтобы контейнерные логи не забили диск.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    logging: *default-logging
    read_only: true # /app только чтение; пишем лишь в том SQLite и tmpfs
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL # caps не нужны: исходящий HTTPS и bind :3000 их не требуют
    volumes:
      - guild-data:/app/data # персист SQLite (DB_PATH=./data/guild-mcp.db -> /app/data)
    expose:
      - "3000"
    networks: [web]

  # Cloudflare Tunnel: исходящее соединение к CF, origin не открывает входящих портов.
  # Ingress (hostname -> http://app:3000) настраивается в дашборде туннеля (dashboard-managed).
  cloudflared:
    image: cloudflare/cloudflared:2026.7.1
    restart: unless-stopped
    depends_on: [app]
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL # только исходящее соединение к CF — caps не нужны
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN} # токен туннеля из CF Zero Trust; в .env, не в git
    networks: [web]

volumes:
  guild-data:

networks:
  web:
